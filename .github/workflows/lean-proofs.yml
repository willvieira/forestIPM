name: Lean Proofs

on:
  push:
    branches: [master]
    paths:
      - 'lean/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
  pull_request:
    paths:
      - 'lean/**'
      - 'lakefile.lean'
      - 'lean-toolchain'

permissions:
  contents: write

jobs:
  build:
    name: lake build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: lake build
        run: lake build

      - name: Update proof-status.json and README section
        run: bash lean/proof_status.sh --inject-readme

      - name: Write proof table to job summary
        run: bash lean/proof_status.sh >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated files
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lean/proof-status.json README.md
          git diff --staged --quiet || git commit -m "ci: update lean proof status [skip ci]"
          git push
